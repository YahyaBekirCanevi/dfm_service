<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DFM Engine v2 - Analyzer</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/occt-import-js@0.0.23/dist/occt-import-js.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
          "occt-import-js": "https://unpkg.com/occt-import-js@0.0.23/dist/occt-import-js.js"
        }
      }
    </script>
    <style>
      :root {
        --primary: #3b82f6;
        --bg: #0f172a;
        --card-bg: rgba(30, 41, 59, 0.7);
        --text-main: #f8fafc;
        --text-dim: #94a3b8;
      }

      body {
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
        background-color: var(--bg);
        color: var(--text-main);
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
      }

      .container {
        width: 100%;
        max-width: 1200px;
        padding: 2rem;
        box-sizing: border-box;
      }

      header {
        margin-bottom: 2rem;
        text-align: center;
      }

      h1 {
        font-size: 2.5rem;
        margin-bottom: 0.5rem;
        background: linear-gradient(to right, #60a5fa, #a855f7);
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .main-layout {
        display: grid;
        grid-template-columns: 1fr 350px;
        gap: 2rem;
        width: 100%;
      }

      .viewer-container {
        position: relative;
        width: 100%;
        aspect-ratio: 16 / 9;
        background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        border-radius: 1rem;
        overflow: hidden;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      #viewport {
        width: 100%;
        height: 100%;
      }

      .sidebar {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }

      .card {
        background: var(--card-bg);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 1rem;
        padding: 1.5rem;
      }

      .upload-section {
        margin-bottom: 1rem;
      }

      input[type="file"] {
        display: none;
      }

      .upload-btn {
        display: inline-block;
        padding: 0.75rem 1.5rem;
        background: var(--primary);
        color: white;
        border-radius: 0.5rem;
        cursor: pointer;
        font-weight: 600;
        transition:
          transform 0.2s,
          background 0.2s;
        width: 100%;
        text-align: center;
        box-sizing: border-box;
      }

      .upload-btn:hover {
        background: #2563eb;
        transform: translateY(-2px);
      }

      .feedback-list {
        flex-grow: 1;
        overflow-y: auto;
        max-height: 500px;
      }

      .feedback-item {
        padding: 1rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        cursor: pointer;
        transition: background 0.2s;
      }

      .feedback-item:hover {
        background: rgba(255, 255, 255, 0.05);
      }

      .severity-high {
        border-left: 4px solid #ef4444;
      }
      .severity-medium {
        border-left: 4px solid #f59e0b;
      }
      .severity-low {
        border-left: 4px solid #10b981;
      }

      .feedback-title {
        font-weight: 600;
        margin-bottom: 0.25rem;
        font-size: 0.9rem;
      }

      .feedback-msg {
        font-size: 0.8rem;
        color: var(--text-dim);
      }

      #loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(15, 23, 42, 0.8);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 10;
      }

      .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(255, 255, 255, 0.1);
        border-top-color: var(--primary);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>DFM Engine v2</h1>
        <p style="color: var(--text-dim)">
          Deterministic Geometric Analysis for CNC Milling
        </p>
      </header>

      <div class="main-layout">
        <div class="viewer-container">
          <div id="loading-overlay">
            <div class="spinner"></div>
          </div>
          <div id="viewport"></div>
        </div>

        <div class="sidebar">
          <div class="card">
            <h3 style="margin-top: 0">Upload Model</h3>
            <form
              id="upload-form"
              hx-post="/analyze"
              hx-encoding="multipart/form-data"
              hx-swap="none"
              hx-on:htmx:after-request="handleUploadResponse(event)"
            >
              <label for="file-upload" class="upload-btn"
                >Choose STEP File</label
              >
              <input
                type="file"
                id="file-upload"
                name="file"
                accept=".step,.stp"
                onchange="
                  document
                    .getElementById('upload-form')
                    .dispatchEvent(new Event('submit'))
                "
              />
            </form>
            <div
              id="status-msg"
              style="
                margin-top: 1rem;
                font-size: 0.8rem;
                color: var(--text-dim);
              "
            ></div>
          </div>

          <div class="card feedback-list">
            <h3 style="margin-top: 0">DFM Feedback</h3>
            <div id="feedback-items">
              <p style="color: var(--text-dim); font-size: 0.9rem">
                Upload a model to see analysis results.
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      // Global Error Handling for Debugging
      window.addEventListener("error", (event) => {
        console.error("Global Error:", event.error);
        const statusMsg = document.getElementById("status-msg");
        if (statusMsg) {
          statusMsg.textContent =
            "Runtime Error: " + (event.error?.message || "Unknown error");
          statusMsg.style.color = "#ef4444";
        }
      });

      window.handleUploadResponse = (event) => {
        console.log("HTMX: Request finished", event.detail);
        const loading = document.getElementById("loading-overlay");
        if (loading) loading.style.display = "none";

        if (event.detail.successful) {
          console.log("HTMX: Success, parsing response...");
          try {
            const response = JSON.parse(event.detail.xhr.responseText);
            console.log("API Response:", response);

            // Call the UI update function (defined below or in module)
            if (window.updateUI) window.updateUI(response);

            // Trigger 3D load if viewer exists
            const file = document.getElementById("file-upload").files[0];
            if (file && window.dfmViewer) {
              console.log(
                "ThreeJS: Creating blob URL and loading model...",
                file.name,
              );
              const url = URL.createObjectURL(file);
              window.dfmViewer.loadModel(url, response);
            } else {
              console.warn("ThreeJS: Viewer or file not ready", {
                hasViewer: !!window.dfmViewer,
                hasFile: !!file,
              });
            }
          } catch (e) {
            console.error("Frontend: Error processing response", e);
          }
        } else {
          console.error(
            "HTMX: Error",
            event.detail.xhr.status,
            event.detail.xhr.statusText,
          );
          const statusMsg = document.getElementById("status-msg");
          if (statusMsg) {
            statusMsg.textContent =
              "Error: " + (event.detail.xhr.statusText || "Server error");
            statusMsg.style.color = "#ef4444";
          }
        }
      };

      window.updateUI = (data) => {
        console.log("UI: Updating feedback list...");
        const container = document.getElementById("feedback-items");
        if (!container) return;
        container.innerHTML = "";

        if (!data.dfm_feedback || data.dfm_feedback.length === 0) {
          container.innerHTML =
            '<p style="color: #10b981">No manufacturability issues detected.</p>';
          return;
        }

        data.dfm_feedback.forEach((item, index) => {
          const div = document.createElement("div");
          div.className = `feedback-item severity-${item.severity}`;
          div.innerHTML = `
                    <div class="feedback-title">${item.rule_id}</div>
                    <div class="feedback-msg">${item.message}</div>
                `;
          div.onclick = () => {
            if (window.dfmViewer) window.dfmViewer.highlightRule(item);
          };
          container.appendChild(div);
        });

        const statusMsg = document.getElementById("status-msg");
        if (statusMsg) {
          statusMsg.textContent = `Success: Analysis complete (${data.units}).`;
          statusMsg.style.color = "#10b981";
        }
      };
    </script>

    <script type="module">
      console.log("Frontend: Initializing DFM Viewer module...");
      try {
        const { DFMViewer } = await import("/static/js/viewer.js");
        window.dfmViewer = new DFMViewer("viewport");
        console.log("ThreeJS: Viewer initialized successfully");
      } catch (e) {
        console.error("ThreeJS: Failed to initialize viewer", e);
        const statusMsg = document.getElementById("status-msg");
        if (statusMsg) {
          statusMsg.textContent = "Viewer Error: Failed to load 3D visualizer.";
          statusMsg.style.color = "#ef4444";
        }
      }

      document.getElementById("upload-form").addEventListener("submit", () => {
        console.log("HTMX: Form submission started");
        document.getElementById("loading-overlay").style.display = "flex";
        document.getElementById("status-msg").textContent = "Analyzing...";
        document.getElementById("status-msg").style.color = "var(--text-dim)";
      });
    </script>
  </body>
</html>
